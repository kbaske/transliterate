<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transliteration Tool</title>
    <link rel="stylesheet" href="css/transliterate.css">
</head>
<body>
    <div class="container">
        <h1>Transliteration Tool</h1>
        <p>Enter your text and click "Transliterate" to see the results.</p>
        <textarea id="input" placeholder="Enter your text here..."></textarea>
        <button class="button" onclick="performTransliteration()">Transliterate</button>
        <div class="button-container">
            <button class="button reset-button" onclick="resetInput()">Reset Input</button>
            <button class="button copy-button" onclick="copyToClipboard()">Copy Output</button>
        </div>
        

        <h2>Output:</h2>
        <div id="output"></div>
    </div>
    <script src="js/transliterate.js"></script>
    <script src="https://raw.githubusercontent.com/kbaske/kbaske.github.io/refs/heads/main/data/transliterate/beng.js"></script>
    <script src="https://raw.githubusercontent.com/kbaske/kbaske.github.io/refs/heads/main/data/transliterate/devn.js"></script>
    <script src="https://raw.githubusercontent.com/kbaske/kbaske.github.io/refs/heads/main/data/transliterate/latn.js"></script>

</body>
</html>
